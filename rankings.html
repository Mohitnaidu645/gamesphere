<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rankings | GameSphere</title>
  <link rel="stylesheet" href="rankings.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <h2 class="logo">🎮 GameSphere</h2>
    <a href="index.html" class="back-btn">⬅ Back to Home</a>
  </nav>

  <!-- Rankings Container -->
  <div class="rankings-container">

    <h1>🏆 Rankings</h1>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('teams', this)">
        Team Rankings
      </button>
      <button class="tab-btn" onclick="showTab('players', this)">
        Player Rankings
      </button>
    </div>

    <!-- ================= TEAM RANKINGS ================= -->
    <div id="teams" class="tab-content active">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Team Name</th>
            <th>Tournament</th>
            <th>Matches</th>
            <th>Kills</th>
            <th>Total Points</th>
          </tr>
        </thead>
        <tbody id="teamTable"></tbody>
      </table>
    </div>

    <!-- ================= PLAYER RANKINGS ================= -->
    <div id="players" class="tab-content">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Player Name</th>
            <th>Team Name</th>
            <th>Tier</th>
          </tr>
        </thead>
        <tbody id="playerTable"></tbody>
      </table>
    </div>

  </div>

  <!-- JS -->
  <script src="rankings.js"></script>
</body>
</html>
